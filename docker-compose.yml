version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: calvozo-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: "!Trudes3005"
      MYSQL_DATABASE: calvozo

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./calvozo-api
      dockerfile: Dockerfile.dev

    container_name: calvozo-api
    restart: unless-stopped

    ports:
      - "3333:3333"

    volumes:
      - ./calvozo-api:/app
      - /app/node_modules

    environment:
      PORT: 3333
      DATABASE_URL: "mysql://root:%21Trudes3005@mysql:3306/calvozo"

    depends_on:
      - mysql

  frontend:
    build:
      context: ./calvozo-restaurant
      dockerfile: Dockerfile

    container_name: calvozo-frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    volumes:
      - ./calvozo-restaurant:/app
      - /app/node_modules

    environment:
      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      - backend

volumes:
  mysql_data: